<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  <script defer src="main.js"></script></head>
  <body class="h-screen text-slate-700 flex bg-zinc-300">
    <section
      class="w-1/5 h-screen p-12 flex flex-col items-center justify-between"
      id="sidebar"
    >
      <div class="flex justify-center items-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          class="stroke-slate-700 w-7 h-7"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
          />
        </svg>
        <input
          class="pl-1 py-1 bg-transparent border-b-slate-500 border-b-2 outline-none"
          type="text"
          id="searchLocation"
          placeholder="search city"
        />
      </div>
      <div class="flex items-center flex-col">
        <h2 class="text-8xl" id="temparature">N/A</h2>
        <h2 class="text-5xl" id="temparatureF">N/A</h2>
      </div>
      <div
        class="bg-slate-700 text-zinc-300 rounded-md items-center w-full h-12 flex justify-center gap-2 text-xl"
      >
        <h5 id="feelsLike">N/A</h5>
      </div>
      <div
        class="bg-slate-700 text-zinc-300 rounded-md items-center w-full h-12 flex justify-center gap-2 text-xl"
      >
        <h4 id="wind-speed">N/A</h4>
      </div>
      <div
        class="bg-slate-700 text-zinc-300 rounded-md items-center w-full h-16 flex justify-center gap-12 text-xl"
      >
        <div class="flex flex-col items-center">
          <span class="border-b-2 border-slate-200">Sunrise</span>
          <h3 id="sunrise">N/A</h3>
        </div>
        <div class="flex flex-col items-center">
          <span class="border-b-2 border-slate-200">Sunset</span>
          <h3 id="sunset">N/A</h3>
        </div>
      </div>
      <div
        class="bg-slate-700 text-zinc-300 rounded-md items-center w-full h-12 flex justify-center gap-2 text-xl"
      >
        <h4 id="pressure">N/A</h4>
      </div>
      <div
        class="bg-slate-700 text-zinc-300 rounded-md items-center w-full h-12 flex justify-center gap-2 text-xl"
      >
        <h4 id="humidity">N/A</h4>
      </div>
      <div
        class="bg-slate-700 text-zinc-300 rounded-md items-center w-full h-12 flex justify-center gap-2 text-xl"
      >
        <h4 id="visibility">N/A</h4>
      </div>
      <div
        class="bg-slate-700 text-zinc-300 rounded-md items-center w-full h-12 flex gap-2 justify-center text-xl"
      >
        <h4 id="lastUpdate">N/A</h4>
      </div>
    </section>
    <section class="w-4/5 h-screen p-12" id="main-content">
      <p
        class="select-none text-xl border-2 border-x-transparent border-y-slate-700 inline px-4 py-2"
      >
        SkyCast°
      </p>
      <h6 class="text-4xl pt-24" id="city">N/A</h6>
      <h1 class="text-8xl pt-2" id="condition">N/A</h1>
      <h6 class="flex gap-2 pt-4 text-2xl" id="currentDate">N/A</h6>
      <h5 class="text-8xl py-11" id="weatherEmoji"></h5>

      <div class="flex justify-between items-end">
        <div
          class="flex flex-col justify-around rounded-xl bg-slate-700 text-zinc-300 w-1/5 h-96 p-6 text-center"
        >
          <h5 class="text-2xl" id="tomorrow">N/A</h5>
          <h6 class="text-7xl" id="weatherCondition">N/A</h6>
          <h4 class="text-2xl" id="cloudsTomorrow">N/A</h4>
          <h4 class="text-xl" id="windSpeedTomorrow">N/A</h4>
        </div>
        <div
          class="flex flex-col justify-around rounded-xl bg-slate-700 text-zinc-300 w-1/5 h-96 p-6 text-center"
        >
          <h5 class="text-2xl" id="tomorrow2">N/A</h5>
          <h6 class="text-7xl" id="weatherCondition2">N/A</h6>
          <h4 class="text-2xl" id="cloudsTomorrow2">N/A</h4>
          <h4 class="text-xl" id="windSpeedTomorrow2">N/A</h4>
        </div>
        <div
          class="flex flex-col justify-around rounded-xl bg-slate-700 text-zinc-300 w-1/5 h-96 text-center p-6"
        >
          <h5 class="text-2xl" id="tomorrow3">N/A</h5>
          <h6 class="text-7xl" id="weatherCondition3">N/A</h6>
          <h4 class="text-2xl" id="cloudsTomorrow3">N/A</h4>
          <h4 class="text-xl" id="windSpeedTomorrow3">N/A</h4>
        </div>
        <div
          class="flex flex-col justify-around rounded-xl bg-slate-700 text-zinc-300 w-1/5 h-96 text-center p-6"
        >
          <h5 class="text-2xl" id="tomorrow4">N/A</h5>
          <h6 class="text-7xl" id="weatherCondition4">N/A</h6>
          <h4 class="text-2xl" id="cloudsTomorrow4">N/A</h4>
          <h4 class="text-xl" id="windSpeedTomorrow4">N/A</h4>
        </div>
      </div>
    </section>
  </body>
</html>
