<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  <script defer src="main.js"></script></head>
  <body class="h-screen text-white font-light flex">
    <img src="/src/images/rain.jpg" alt="" id="bg-img" />
    <section
      class="w-1/5 h-screen p-12 border-2 flex flex-col items-center justify-between"
      id="sidebar"
    >
      <div class="flex justify-center items-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="white"
          class="w-7 h-7 right-16 py-1 absolute"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
          />
        </svg>
        <input
          class="pl-1 py-1 bg-transparent border-b-slate-200 border-b-2 outline-none"
          type="text"
          id="searchLocation"
          placeholder="search"
        />
      </div>
      <div class="flex items-center flex-col font-extralight">
        <h2 class="text-8xl" id="temparature">20°</h2>
        <h2 class="text-7xl" id="temparatureF">68f</h2>
      </div>
      <div class="flex justify-center gap-2 p-4 text-xl">
        <span>Wind Speed:</span>
        <h4 id="wind-speed">24kmh</h4>
      </div>
      <div class="flex justify-center gap-12 p-4 text-xl">
        <div class="flex flex-col items-center">
          <span class="border-b-2 border-slate-200">Sunrise</span>
          <h3 id="sunrise">5:56</h3>
        </div>
        <div class="flex flex-col items-center">
          <span class="border-b-2 border-slate-200">Sunset</span>
          <h3 id="sunset">20:04</h3>
        </div>
      </div>
      <div class="flex justify-center gap-2 p-4 text-xl">
        <span>Pressure:</span>
        <h4 id="pressure">1000,43ph</h4>
      </div>
      <div class="flex justify-center gap-2 p-4 text-xl">
        <span>Humidity:</span>
        <h4 id="humidity">69%</h4>
      </div>
      <div class="flex justify-center gap-2 p-4 text-xl">
        <span>Visibility:</span>
        <h4 id="visibility">N/A</h4>
      </div>
      <div class="flex gap-2 text-sm">
        <span>Weather Last Updated:</span>
        <h4 id="lastUpdate">20.03.2023</h4>
      </div>
    </section>
    <section class="w-4/5 h-screen p-12 overflow-hidden" id="main-content">
      <p
        class="select-none text-2xl border-2 border-x-transparent border-y-white inline px-4 py-2"
      >
        SkyCast°
      </p>
      <h1 class="text-9xl text-slate-200 font-light mt-28" id="condition">
        Cloudy
      </h1>
      <div class="flex gap-2 text-xl py-8 pl-3">
        <h6 id="city">Vienna,</h6>
        <h6 id="date">Jan 7, 2023, 8:45</h6>
      </div>
      <div class="flex h-3/5 justify-between items-end">
        <div class="card w-1/5 h-4/5 p-4"></div>
        <div class="card w-1/5 h-4/5"></div>
        <div class="card w-1/5 h-4/5"></div>
        <div class="card w-1/5 h-4/5"></div>
      </div>
    </section>
  </body>
</html>
