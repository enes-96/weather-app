<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  <script defer src="main.js"></script></head>
  <body class="h-screen text-white font-light flex">
    <img src="/src/images/rain.jpg" alt="" id="bg-img" />
    <section
      class="w-1/5 h-screen p-12 border-2 flex flex-col items-center justify-between"
      id="sidebar"
    >
      <div class="flex justify-center items-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="white"
          class="w-7 h-7 right-16 py-1 absolute"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
          />
        </svg>
        <input
          class="pl-1 py-1 bg-transparent border-b-slate-200 border-b-2 outline-none"
          type="text"
          id="searchLocation"
          placeholder="search city"
        />
      </div>
      <div class="flex items-center flex-col font-extralight">
        <h2 class="text-8xl" id="temparature">N/A</h2>
        <h2 class="text-5xl" id="temparatureF">N/A</h2>
      </div>
      <div class="flex justify-center gap-1 p-4 text-xl">
        <span>Wind Speed:</span>
        <h4 id="wind-speed">N/A</h4>
        <span>km/h</span>
      </div>
      <div class="flex justify-center gap-12 p-4 text-xl">
        <div class="flex flex-col items-center">
          <span class="border-b-2 border-slate-200">Sunrise</span>
          <h3 id="sunrise">N/A</h3>
        </div>
        <div class="flex flex-col items-center">
          <span class="border-b-2 border-slate-200">Sunset</span>
          <h3 id="sunset">N/A</h3>
        </div>
      </div>
      <div class="flex justify-center gap-2 p-4 text-xl">
        <span>Pressure:</span>
        <h4 id="pressure">N/A</h4>
      </div>
      <div class="flex justify-center gap-2 p-4 text-xl">
        <span>Humidity:</span>
        <h4 id="humidity">N/A</h4>
      </div>
      <div class="flex justify-center gap-2 p-4 text-xl">
        <span>Visibility:</span>
        <h4 id="visibility">N/A</h4>
      </div>
      <div class="flex gap-2 text-md">
        <span>Weather Last Updated:</span>
        <h4 id="lastUpdate">N/A</h4>
      </div>
    </section>
    <section class="w-4/5 h-screen p-12 overflow-hidden" id="main-content">
      <p
        class="select-none text-2xl border-2 border-x-transparent border-y-white inline px-4 py-2"
      >
        SkyCast°
      </p>
      <h6 class="text-5xl pt-24" id="city">N/A</h6>
      <h1 class="text-9xl pt-2 text-slate-200 font-light" id="condition">
        N/A
      </h1>
      <h6 class="flex gap-2 pt-4 text-2xl" id="currentDate">N/A</h6>
      <div class="flex h-3/5 justify-between items-end">
        <div id="tomorrow" class="card w-1/5 h-4/5 p-4"></div>
        <div id="tomorrow2" class="card w-1/5 h-4/5"></div>
        <div id="tomorrow3" class="card w-1/5 h-4/5"></div>
        <div id="tomorrow4" class="card w-1/5 h-4/5"></div>
      </div>
    </section>
  </body>
</html>
